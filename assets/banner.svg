<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#grad)" rx="15" ry="15"/>
  <text x="50%" y="40%" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    Awesome Insurance Brokers
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="50%" y="70%" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    Top Platforms &amp; Open-Source Alternatives
  </text>
  <circle cx="100" cy="100" r="20" fill="#ffffff" opacity="0.3">
    <animate attributeName="cy" values="100;150;100" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="50" r="30" fill="#ffffff" opacity="0.3">
    <animate attributeName="cy" values="50;100;50" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
